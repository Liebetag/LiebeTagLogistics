services:
  - type: web
    name: liebetaglogistics-api
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: API_Bot
    buildCommand: npm install -g bun && bun install && bunx prisma@5.14.0 generate && bunx prisma@5.14.0 db push
    startCommand: bun src/index.ts
    envVars:
      - key: DATABASE_URL
        value: file:/data/liebetag.db
      - key: DB_DIR
        value: /data
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
    disk:
      name: liebetaglogistics-data
      mountPath: /data
      sizeGB: 1

  - type: static
    name: liebetaglogistics-admin
    rootDir: Web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
